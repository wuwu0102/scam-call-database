on:
  schedule:
    - cron: '0 3 */5 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Collect Mexico scam numbers
        run: npm run collect && node scripts/collect_mx_numbers.js

      - name: Auto promote safe numbers
        run: node scripts/auto_promote_safe_numbers.js

      - name: Database safety gate
        run: node scripts/check_database_safety.js

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scam_numbers.json data/pending_numbers.json data/manual_import_numbers.csv data/collection_report.json data/seed_verified_public_numbers.csv data/backups/scam_numbers.backup.json
          git commit -m "Update Mexico scam numbers safely" || echo "No changes to commit"
          git push

      - name: Print collection report
        run: cat data/collection_report.json
