name: Collect MX numbers
on:
  schedule:
    - cron: '0 3 */5 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Smoke test sources (non-blocking)
        run: node scripts/smoke_test_mx_sources.js || echo "smoke warnings only"

      - name: Collect/import/firestore-safe pipeline
        run: |
          npm run validate
          node scripts/collect_mexico_phone_sources.js --target=5000 --max-add=3000 --max-minutes=15
          # This workflow only validates sources and updates temporary collected file + summary report
          npm run validate

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/collected_mexico_numbers.json reports/collection-summary.json data/source_catalog_mexico.json
          git commit -m "Strengthen Mexico number collector sources and normalization" || echo "No changes to commit"
          git push

      - name: Print collection report
        run: |
          cat reports/collection-summary.json || true
