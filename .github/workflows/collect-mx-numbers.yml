on:
  schedule:
    - cron: '0 3 */5 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Smoke test sources (non-blocking)
        run: node scripts/smoke_test_mx_sources.js || echo "smoke warnings only"

      - name: Collect/import/firestore-safe pipeline
        run: |
          node scripts/collect_mexico_phone_sources.js --target=10000 --max-add=2000 --max-minutes=10 || echo "collector warning"
          npm run collect
          node scripts/auto_promote_safe_numbers.js
          node scripts/check_database_safety.js
          node scripts/build_public_stats.js
          npm run validate

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scam_numbers.json data/pending_numbers.json data/manual_import_numbers.csv data/collection_report.json data/seed_verified_public_numbers.csv data/backups/scam_numbers.backup.json data/collected_mexico_numbers.json data/crowd_signal_mexico_numbers.json data/collector_run_log.json data/public_stats.json data/ios_numbers.json data/android_numbers.json data/source_catalog_mexico.json
          git commit -m "Strengthen Mexico number collector sources and normalization" || echo "No changes to commit"
          git push

      - name: Print collection report
        run: |
          cat data/collection_report.json || true
          cat data/collector_run_log.json || true
