on:
  schedule:
    - cron: '0 3 */5 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install collector dependencies
        run: pip install requests beautifulsoup4

      - name: Collector dry-run
        run: python scripts/collect_datostelefonicos_mx.py --dry-run --max-pages 1500

      - name: Merge dry-run
        run: python scripts/merge_mx_collected_numbers.py --dry-run

      - name: Collector real run
        run: python scripts/collect_datostelefonicos_mx.py --max-pages 8000

      - name: Merge real run
        run: python scripts/merge_mx_collected_numbers.py

      - name: Validate integrity
        run: python scripts/validate_mx_database_integrity.py

      - name: Export iOS caller ID JSON
        run: node scripts/export_ios_numbers_from_firestore.js

      - name: Sync public stats
        run: node scripts/generate_public_stats.js --allow-low-count

      - name: Guard non-decreasing count
        run: |
          python - <<'PY'
          import json
          s=json.load(open('reports/mx_collection_summary.json'))
          assert s['after_count'] >= s['before_count'], 'after_count < before_count'
          PY

      - name: Commit allowed changes only
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          CHANGED=$(git diff --name-only)
          if [ -z "$CHANGED" ]; then
            echo "No changes"
            exit 0
          fi
          echo "$CHANGED"
          echo "$CHANGED" | awk '!/^(data\/|reports\/|scam_numbers.json$)/{bad=1} END{exit bad}'
          git add scam_numbers.json data/mx_datostelefonicos_candidates.json data/ios_numbers.json data/public_stats.json reports/mx_collection_summary.json
          git commit -m "Sync MX collection pipeline and public stats" || echo "No commit"
          git push
