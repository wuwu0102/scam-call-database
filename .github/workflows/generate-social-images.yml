name: Generate Social Images

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"

permissions:
  contents: write

jobs:
  generate-social-images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Pillow
        run: pip install pillow

      - name: Generate social images
        id: generate
        run: python scripts/generate_social_images.py

      - name: Validate generated files
        run: |
          set -euo pipefail
          for file in reports/social/daily-post.png reports/social/story.png reports/social/whatsapp-share.png; do
            if [ ! -f "$file" ]; then
              echo "::error::Missing file: $file"
              exit 1
            elif [ ! -s "$file" ]; then
              echo "::error::File is empty: $file"
              exit 1
            fi
          done

      - name: Protected files check
        run: |
          set -euo pipefail
          git diff --name-only > changed_files.txt
          if rg -q '^(scam_numbers\.json$|data/public_stats\.json$|data/ios_numbers\.json$|index\.html$|ios/|android/|app/)' changed_files.txt; then
            echo "::error::Unexpected protected files modified."
            cat changed_files.txt
            exit 1
          fi

      - name: Commit updated social images
        run: |
          if [ -n "$(git status --porcelain reports/social/daily-post.png reports/social/story.png reports/social/whatsapp-share.png)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add reports/social/daily-post.png reports/social/story.png reports/social/whatsapp-share.png
            git commit -m "Update social images"
            git push
          else
            echo "No social image changes to commit."
          fi
