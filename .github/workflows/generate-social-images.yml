name: Generate Social Images

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"

jobs:
  generate-social-images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Pillow
        run: pip install pillow

      - name: Generate social images
        id: generate
        continue-on-error: true
        run: python scripts/generate_social_images.py

      - name: Validate generated files
        if: always()
        run: |
          set +e
          STATUS=0
          for file in reports/social/daily-post.png reports/social/story.png reports/social/whatsapp-share.png; do
            if [ ! -f "$file" ]; then
              echo "::warning::Missing file: $file"
              STATUS=1
            elif [ ! -s "$file" ]; then
              echo "::warning::File is empty: $file"
              STATUS=1
            fi
          done

          git diff --name-only > changed_files.txt
          if rg -q '^(website/|app/|ios/|android/|scam_numbers\.json$)' changed_files.txt; then
            echo "::warning::Unexpected protected files modified."
            STATUS=1
          fi

          if [ "$STATUS" -ne 0 ]; then
            echo "Validation completed with warnings only."
          fi

      - name: Commit updated social images
        if: always()
        run: |
          if [ -n "$(git status --porcelain reports/social)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add reports/social/*.png
            git commit -m "Update social images"
            git push
          else
            echo "No social image changes to commit."
          fi
