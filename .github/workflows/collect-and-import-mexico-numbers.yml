name: Collect and import Mexico numbers

on:
  schedule:
    - cron: "0 3 */5 * *"
  workflow_dispatch:

concurrency:
  group: collect-and-import-mexico-numbers
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  collect-and-import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Sync latest main before collection
        run: |
          git fetch origin main
          git rebase origin/main

      - run: npm install
      - run: npm run validate || true

      - name: Install Python dependencies for DatosTelefonicos pipeline
        run: pip install requests beautifulsoup4

      - name: Run DatosTelefonicos collection pipeline
        id: datostelefonicos
        continue-on-error: true
        run: |
          python scripts/collect_datostelefonicos_mx.py --max-pages 2500
          python scripts/merge_mx_collected_numbers.py
          python scripts/validate_mx_database_integrity.py

      - name: Fallback to legacy collector only if new pipeline failed
        if: steps.datostelefonicos.outcome == 'failure'
        run: |
          node scripts/collect_mexico_phone_sources.js --target=5000 --max-add=3000 --max-minutes=15 || true
          npm run collect

      - run: node scripts/generate_public_stats.js --allow-low-count || node scripts/build_public_stats.js
      - run: npm run validate

      - name: Ensure collection summary exists
        run: |
          mkdir -p reports
          if [ ! -f reports/collection-summary.json ]; then
            echo '{"status":"no_collection_summary","note":"collector did not generate summary in this run"}' > reports/collection-summary.json
          fi

      - name: Commit allowed files only
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git status --short

          git add \
            scam_numbers.json \
            data/collected_mexico_numbers.json \
            data/mx_datostelefonicos_candidates.json \
            data/public_stats.json \
            data/source_catalog_mexico.json \
            reports/mx_collection_summary.json \
            reports/collection-summary.json

          if git diff --cached --quiet; then
            echo "No allowed changes to commit."
            exit 0
          fi

          git commit -m "Sync MX collection pipeline and public stats"

          git fetch origin main
          LOCAL=$(git rev-parse HEAD)
          REMOTE=$(git rev-parse origin/main)
          BASE=$(git merge-base HEAD origin/main)

          if [ "$REMOTE" != "$BASE" ]; then
            echo "Remote main moved during collection. Do not rebase with generated data. Please rerun workflow."
            exit 78
          fi

          git push origin HEAD:main
