name: Collect and import Mexico numbers

on:
  schedule:
    - cron: "0 3 */5 * *"
  workflow_dispatch:

concurrency:
  group: collect-mx-numbers-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  collect-and-import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run validate || true
      - run: node scripts/collect_mexico_phone_sources.js --target=5000 --max-add=3000 --max-minutes=15 || true
      - run: npm run collect
      - run: node scripts/generate_public_stats.js --allow-low-count || node scripts/build_public_stats.js
      - run: npm run validate
      - run: git checkout -- data/ios_numbers.json || true
      - name: Ensure collection summary exists
        run: |
          mkdir -p reports
          if [ ! -f reports/collection-summary.json ]; then
            echo '{"status":"no_collection_summary","note":"collector did not generate summary in this run"}' > reports/collection-summary.json
          fi
      - name: Commit allowed files only
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            scam_numbers.json \
            data/collected_mexico_numbers.json \
            data/public_stats.json \
            data/source_catalog_mexico.json \
            reports/collection-summary.json \
            scripts/collect_mexico_phone_sources.js \
            scripts/generate_public_stats.js \
            scripts/build_public_stats.js \
            .github/workflows/collect-and-import-mexico-numbers.yml

          if git diff --cached --quiet; then
            echo "No allowed changes to commit."
            exit 0
          fi

          git commit -m "Sync MX collection pipeline and public stats"
          git push
