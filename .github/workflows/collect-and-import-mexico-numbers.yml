name: Collect and import Mexico numbers

on:
  schedule:
    - cron: "17 8 * * *"
  workflow_dispatch:

concurrency:
  group: collect-and-import-mexico-numbers
  cancel-in-progress: false

permissions:
  contents: write

env:
  MX_TARGET_TOTAL: "100000"
  TARGET_TOTAL: "100000"
  MAX_ADD_PER_RUN: "3000"

jobs:
  collect-and-import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Sync latest main before collection
        run: |
          git fetch origin main
          git rebase origin/main

      - run: npm install
      - run: npm run validate || true

      - name: Install Python dependencies for DatosTelefonicos pipeline
        run: pip install requests beautifulsoup4

      - name: Run DatosTelefonicos collection pipeline
        id: datostelefonicos
        run: |
          python scripts/collect_datostelefonicos_mx.py --max-pages 2500 --timeout 15 --max-runtime-sec 1200 --stall-pages 300
          python scripts/merge_mx_collected_numbers.py --target-total "$TARGET_TOTAL" --max-add-per-run "$MAX_ADD_PER_RUN"
          python scripts/validate_mx_database_integrity.py
          node scripts/generate_mx_data_audit.js
          node scripts/generate_public_stats.js --allow-low-count

      - run: npm run validate

      - name: Ensure collection summary exists
        run: |
          mkdir -p reports
          if [ ! -f reports/collection-summary.json ]; then
            echo '{"status":"no_collection_summary","note":"collector did not generate summary in this run"}' > reports/collection-summary.json
          fi

      - name: Commit allowed files only
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git status --short

          git add \
            scam_numbers.json \
            data/mx_datostelefonicos_candidates.json \
            data/public_stats.json \
            data/mx_data_audit.json \
            data/ios_numbers.json \
            reports/mx_collection_summary.json \
            reports/collection-summary.json

          if git diff --cached --quiet; then
            echo "No allowed changes to commit."
            exit 0
          fi

          git commit -m "chore(data): update MX scam database with audit report"

          git fetch origin main
          LOCAL=$(git rev-parse HEAD)
          REMOTE=$(git rev-parse origin/main)
          BASE=$(git merge-base HEAD origin/main)

          if [ "$REMOTE" != "$BASE" ]; then
            echo "Remote main moved during collection. Do not rebase with generated data. Please rerun workflow."
            exit 78
          fi

          git push origin HEAD:main
