name: Collect and import Mexico numbers

on:
  schedule:
    - cron: "0 3 */5 * *"
  workflow_dispatch:

concurrency:
  group: collect-mx-numbers-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  collect-and-import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install firebase-admin axios --no-save
      - run: node scripts/discover_mexico_phone_sources.js
      - name: Compute growth targets
        run: |
          CURRENT=$(node -e "const fs=require('fs');const p='data/public_stats.json';let c=0;if(fs.existsSync(p)){const d=JSON.parse(fs.readFileSync(p,'utf8'));c=Number(d.totalSearchableCount||d.collectedCount||0)||0;}console.log(c)")
          TARGET=$((CURRENT + 100))
          HARD_LIMIT=$((CURRENT + 200))
          echo "CURRENT_COUNT=$CURRENT" >> $GITHUB_ENV
          echo "TARGET_COUNT=$TARGET" >> $GITHUB_ENV
          echo "HARD_LIMIT_COUNT=$HARD_LIMIT" >> $GITHUB_ENV
      - run: node scripts/collect_mexico_phone_sources.js --target=${TARGET_COUNT} --max-add=200 --max-minutes=10 || echo "collector failed"
      - run: node scripts/pull_firestore_phone_numbers.js || echo "firestore pull skipped"
      - run: node scripts/rebuild_searchable_database.js --min=${CURRENT_COUNT} --target=${TARGET_COUNT}
      - run: node scripts/check_data_safety.js --min=${CURRENT_COUNT}
      - env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: node scripts/import_mexico_seed_to_firestore.js --dry-run
      - env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: node scripts/import_mexico_seed_to_firestore.js
      - env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: node scripts/export_ios_numbers_from_firestore.js || echo "ios export skipped"
      - run: node scripts/generate_public_stats.js --min=${CURRENT_COUNT}
      - run: node scripts/import_verified_seed_numbers.js || echo "seed import skipped"
      - run: node scripts/scrape_mexico_phone_sources.js || echo "scrape skipped"
      - run: node scripts/promote_safe_scraped_numbers.js
      - run: node scripts/check_database_safety.js
      - run: node scripts/check_scrape_anomalies.js
      - run: cat data/seed_import_report.json || true
      - run: cat data/scrape_report.json || true
      - name: Commit and push safely
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          COMMIT_CREATED=false
          PUSH_SUCCESS=false

          git add \
            data/source_catalog_mexico.json \
            data/collected_mexico_numbers.json \
            data/crowd_signal_mexico_numbers.json \
            data/collector_run_log.json \
            data/public_stats.json \
            data/ios_numbers.json \
            scam_numbers.json \
            data/seed_verified_public_numbers.csv \
            data/seed_import_report.json \
            data/backups/scam_numbers.backup.json \
            data/pending_numbers.json \
            data/scrape_report.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git fetch origin main
            if ! git rebase origin/main; then
              git rebase --abort
              exit 1
            fi
            git commit -m "chore: update collected mexico numbers"
            COMMIT_CREATED=true

            for attempt in 1 2 3; do
              if git push; then
                PUSH_SUCCESS=true
                break
              fi
              if [ "$attempt" -lt 3 ]; then
                git fetch origin main
                if ! git rebase origin/main; then
                  git rebase --abort
                  exit 1
                fi
              fi
            done

            if [ "$PUSH_SUCCESS" != "true" ]; then
              exit 1
            fi
          fi

          SCAM_COUNT=$(node -e "const fs=require('fs');const p='scam_numbers.json';let c=0;if(fs.existsSync(p)){const d=JSON.parse(fs.readFileSync(p,'utf8'));c=Array.isArray(d)?d.length:0;}console.log(c)")
          PENDING_COUNT=$(node -e "const fs=require('fs');const p='data/pending_numbers.json';let c=0;if(fs.existsSync(p)){const d=JSON.parse(fs.readFileSync(p,'utf8'));c=Array.isArray(d)?d.length:0;}console.log(c)")
          SCRAPE_SUMMARY=$(node -e "const fs=require('fs');const p='data/scrape_report.json';if(!fs.existsSync(p)){console.log('not found');process.exit(0);}const d=JSON.parse(fs.readFileSync(p,'utf8'));if(Array.isArray(d)){console.log('array length: '+d.length);}else if(d&&typeof d==='object'){console.log(JSON.stringify(d).slice(0,500));}else{console.log(String(d));}")
          PUBLIC_STATS_SUMMARY=$(node -e "const fs=require('fs');const p='data/public_stats.json';if(!fs.existsSync(p)){console.log('not found');process.exit(0);}const d=JSON.parse(fs.readFileSync(p,'utf8'));if(Array.isArray(d)){console.log('array length: '+d.length);}else if(d&&typeof d==='object'){console.log(JSON.stringify(d).slice(0,500));}else{console.log(String(d));}")

          {
            echo "## Collect and import summary"
            echo ""
            echo "- scam_numbers.json count: ${SCAM_COUNT}"
            echo "- data/pending_numbers.json count: ${PENDING_COUNT}"
            echo "- data/scrape_report.json summary: ${SCRAPE_SUMMARY}"
            echo "- data/public_stats.json summary: ${PUBLIC_STATS_SUMMARY}"
            echo "- commit created: ${COMMIT_CREATED}"
            echo "- push successful: ${PUSH_SUCCESS}"
          } >> "$GITHUB_STEP_SUMMARY"
