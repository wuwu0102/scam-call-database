<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Phone Lookup</title>
  <style>
    :root {
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f5f6f8;
      color: #111;
      padding: 16px 0;
    }

    .app {
      width: min(92vw, 420px);
      text-align: center;
    }

    .section {
      background: #fff;
      border: 1px solid #e5e6ea;
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 10px;
    }

    h2 {
      margin: 6px 0 10px;
      font-size: 1rem;
    }

    input,
    select,
    button {
      width: 100%;
      box-sizing: border-box;
      border-radius: 12px;
      border: 1px solid #ccc;
      padding: 14px;
      font-size: 1.05rem;
      margin-bottom: 10px;
      background: #fff;
    }

    button {
      background: #111;
      color: #fff;
      border: none;
      cursor: pointer;
    }

    #result {
      margin-top: 10px;
      font-size: clamp(2rem, 10vw, 3rem);
      font-weight: 700;
      min-height: 1.3em;
    }

    #setupMsg,
    #reportMsg {
      min-height: 1.2em;
      font-size: 0.95rem;
    }

    #setupMsg {
      color: #a33;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="section">
      <h2>Search</h2>
      <div id="setupMsg" aria-live="polite"></div>
      <input id="phoneInput" type="tel" placeholder="Phone number" autocomplete="off" />
      <button id="searchBtn" type="button">Search</button>
      <div id="result" aria-live="polite"></div>
    </section>

    <section class="section">
      <h2>Report</h2>
      <input id="reportPhoneInput" type="tel" placeholder="Phone number" autocomplete="off" />
      <select id="reportLabelInput" aria-label="Report label">
        <option value="scam">Scam</option>
        <option value="safe">Safe</option>
        <option value="unknown">Unknown</option>
      </select>
      <input id="reportNoteInput" type="text" placeholder="Note (optional)" autocomplete="off" />
      <button id="reportBtn" type="button">Save</button>
      <div id="reportMsg" aria-live="polite"></div>
    </section>
  </main>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
    import {
      collection,
      getFirestore,
      getDocs,
      addDoc
    } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA5uH0wpdpgQHiKlrHp5DgrF7cgEXLHm5w",
      authDomain: "phone-lookup-app-f8f33.firebaseapp.com",
      projectId: "phone-lookup-app-f8f33",
      storageBucket: "phone-lookup-app-f8f33.firebasestorage.app",
      messagingSenderId: "161960355251",
      appId: "1:161960355251:web:4fa3b7ccb25dfbf63957c6",
      measurementId: "G-0KLSX77SM7"
    };

    const LABELS = {
      scam: { "zh-TW": "詐騙", en: "Scam", "es-MX": "Estafa" },
      safe: { "zh-TW": "安全", en: "Safe", "es-MX": "Seguro" },
      unknown: { "zh-TW": "未知", en: "Unknown", "es-MX": "Desconocido" }
    };
    const COLLECTION_NAME = "phone_numbers";

    const resultEl = document.getElementById("result");
    const setupMsgEl = document.getElementById("setupMsg");
    const inputEl = document.getElementById("phoneInput");
    const searchBtn = document.getElementById("searchBtn");
    const reportPhoneEl = document.getElementById("reportPhoneInput");
    const reportLabelEl = document.getElementById("reportLabelInput");
    const reportNoteEl = document.getElementById("reportNoteInput");
    const reportBtn = document.getElementById("reportBtn");
    const reportMsgEl = document.getElementById("reportMsg");

    const getLang = () => {
      const lang = (navigator.language || "en").toLowerCase();
      if (lang === "zh-tw" || lang.startsWith("zh")) return "zh-TW";
      if (lang === "es-mx" || lang.startsWith("es")) return "es-MX";
      return "en";
    };

    const lang = getLang();
    const normalizePhoneNumber = (value) => String(value || "").replace(/\D/g, "");
    const buildPhoneKeys = (value) => {
      const normalized = normalizePhoneNumber(value);
      if (!normalized) return [];

      const keys = [normalized];
      if (normalized.length === 11 && normalized.startsWith("1")) {
        keys.push(normalized.slice(1));
      }
      return keys;
    };

    const isPhoneMatch = (left, right) => {
      const leftKeys = buildPhoneKeys(left);
      const rightKeys = buildPhoneKeys(right);
      return leftKeys.some((leftKey) => rightKeys.includes(leftKey));
    };

    const isKnownLabel = (label) => Object.hasOwn(LABELS, label);

    const showTag = (tag) => {
      if (isKnownLabel(tag)) {
        resultEl.textContent = LABELS[tag][lang];
        return;
      }
      resultEl.textContent = tag || LABELS.unknown[lang];
    };

    let firestore = null;
    let records = [];

    try {
      const app = initializeApp(firebaseConfig);
      firestore = getFirestore(app);
    } catch {
      setupMsgEl.textContent = "Cloud lookup unavailable. Using local fallback.";
    }

    const findLatestFirestoreRecord = async (phoneNormalized) => {
      if (!firestore) return null;

      try {
        const snapshot = await getDocs(collection(firestore, COLLECTION_NAME));

        let latest = null;
        snapshot.forEach((docItem) => {
          const record = docItem.data();
          const recordNumber = record.normalizedNumber || record.number || "";
          if (!isPhoneMatch(recordNumber, phoneNormalized)) return;

          if (!latest || Number(record.createdAt || 0) > Number(latest.createdAt || 0)) {
            latest = record;
          }
        });

        return latest;
      } catch {
        setupMsgEl.textContent = "Cloud lookup failed. Showing local results.";
        return null;
      }
    };

    const search = async () => {
      const phone = normalizePhoneNumber(inputEl.value.trim());
      if (!phone) {
        showTag("unknown");
        return;
      }

      const firestoreRecord = await findLatestFirestoreRecord(phone);
      if (firestoreRecord && firestoreRecord.tag) {
        showTag(firestoreRecord.tag);
        return;
      }

      const fromJson = records.find((record) => isPhoneMatch(record.normalizedPhone || record.phone || "", phone));
      showTag(fromJson && fromJson.label ? fromJson.label : "unknown");
    };

    const submitReport = async () => {
      const originalPhone = reportPhoneEl.value.trim();
      const normalizedPhone = normalizePhoneNumber(originalPhone);
      const tag = reportLabelEl.value;
      const note = reportNoteEl.value.trim();

      if (!normalizedPhone || !isKnownLabel(tag)) {
        reportMsgEl.textContent = "Enter number + label";
        return;
      }

      if (!firestore) {
        reportMsgEl.textContent = "Cloud report unavailable";
        return;
      }

      try {
        await addDoc(collection(firestore, COLLECTION_NAME), {
          number: originalPhone,
          normalizedNumber: normalizedPhone,
          tag,
          lang,
          note,
          createdAt: Date.now(),
        });

        reportPhoneEl.value = "";
        reportLabelEl.value = "scam";
        reportNoteEl.value = "";
        reportMsgEl.textContent = "Saved to cloud";
      } catch {
        reportMsgEl.textContent = "Cloud save failed";
      }
    };

    searchBtn.addEventListener("click", () => {
      search();
    });

    inputEl.addEventListener("keydown", (event) => {
      if (event.key === "Enter") search();
    });

    reportBtn.addEventListener("click", () => {
      submitReport();
    });

    reportPhoneEl.addEventListener("keydown", (event) => {
      if (event.key === "Enter") submitReport();
    });

    fetch("./scam_numbers.json")
      .then((response) => {
        if (!response.ok) {
          throw new Error("Failed to load data");
        }
        return response.json();
      })
      .then((data) => {
        const loaded = Array.isArray(data.records) ? data.records : [];
        records = loaded.map((record) => ({
          ...record,
          normalizedPhone: normalizePhoneNumber(record.phone || "")
        }));
      })
      .catch(() => {
        records = [];
      });
  </script>
</body>
</html>
