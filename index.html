<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Phone Lookup</title>
  <style>
    :root {
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f5f6f8;
      color: #111;
      padding: 16px 0;
    }

    .app {
      width: min(92vw, 420px);
      text-align: center;
    }

    .section {
      background: #fff;
      border: 1px solid #e5e6ea;
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 10px;
    }

    h2 {
      margin: 6px 0 10px;
      font-size: 1rem;
    }

    input,
    select,
    button {
      width: 100%;
      box-sizing: border-box;
      border-radius: 12px;
      border: 1px solid #ccc;
      padding: 14px;
      font-size: 1.05rem;
      margin-bottom: 10px;
      background: #fff;
    }

    button {
      background: #111;
      color: #fff;
      border: none;
      cursor: pointer;
    }

    #result {
      margin-top: 10px;
      font-size: clamp(2rem, 10vw, 3rem);
      font-weight: 700;
      min-height: 1.3em;
    }

    #reportMsg {
      min-height: 1.2em;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="section">
      <h2>Search</h2>
      <input id="phoneInput" type="tel" placeholder="Phone number" autocomplete="off" />
      <button id="searchBtn" type="button">Search</button>
      <div id="result" aria-live="polite"></div>
    </section>

    <section class="section">
      <h2>Report</h2>
      <input id="reportPhoneInput" type="tel" placeholder="Phone number" autocomplete="off" />
      <select id="reportLabelInput" aria-label="Report label">
        <option value="scam">Scam</option>
        <option value="safe">Safe</option>
        <option value="unknown">Unknown</option>
      </select>
      <button id="reportBtn" type="button">Save</button>
      <div id="reportMsg" aria-live="polite"></div>
    </section>
  </main>

  <script>
    const LABELS = {
      scam: { "zh-TW": "詐騙", en: "Scam", "es-MX": "Estafa" },
      safe: { "zh-TW": "安全", en: "Safe", "es-MX": "Seguro" },
      unknown: { "zh-TW": "未知", en: "Unknown", "es-MX": "Desconocido" }
    };
    const STORAGE_KEY = "phone_reports_v1";

    const resultEl = document.getElementById("result");
    const inputEl = document.getElementById("phoneInput");
    const searchBtn = document.getElementById("searchBtn");
    const reportPhoneEl = document.getElementById("reportPhoneInput");
    const reportLabelEl = document.getElementById("reportLabelInput");
    const reportBtn = document.getElementById("reportBtn");
    const reportMsgEl = document.getElementById("reportMsg");

    const getLang = () => {
      const lang = (navigator.language || "en").toLowerCase();
      if (lang === "zh-tw" || lang.startsWith("zh")) return "zh-TW";
      if (lang === "es-mx" || lang.startsWith("es")) return "es-MX";
      return "en";
    };

    const lang = getLang();
    const normalizePhoneNumber = (value) => String(value || "").replace(/\D/g, "");
    const buildPhoneKeys = (value) => {
      const normalized = normalizePhoneNumber(value);
      if (!normalized) return [];

      const keys = [normalized];
      if (normalized.length === 11 && normalized.startsWith("1")) {
        keys.push(normalized.slice(1));
      }
      return keys;
    };
    const isPhoneMatch = (left, right) => {
      const leftKeys = buildPhoneKeys(left);
      const rightKeys = buildPhoneKeys(right);
      return leftKeys.some((leftKey) => rightKeys.includes(leftKey));
    };
    const isKnownLabel = (label) => Object.hasOwn(LABELS, label);

    const readReports = () => {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        const parsed = raw ? JSON.parse(raw) : [];
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    };

    const writeReports = (reports) => {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(reports));
    };

    const showLabel = (label) => {
      const normalizedLabel = isKnownLabel(label) ? label : "unknown";
      resultEl.textContent = LABELS[normalizedLabel][lang];
    };

    const findLatestLocalLabel = (phone) => {
      const reports = readReports();
      let latest = null;

      for (const report of reports) {
        const reportPhone = report.normalizedPhone || report.phone || "";
        if (!isPhoneMatch(reportPhone, phone) || !isKnownLabel(report.label)) {
          continue;
        }

        if (!latest || Number(report.createdAt || 0) > Number(latest.createdAt || 0)) {
          latest = report;
        }
      }

      return latest ? latest.label : null;
    };

    let records = [];

    const search = () => {
      const phone = normalizePhoneNumber(inputEl.value.trim());
      if (!phone) {
        showLabel("unknown");
        return;
      }

      const localLabel = findLatestLocalLabel(phone);
      if (localLabel) {
        showLabel(localLabel);
        return;
      }

      const fromJson = records.find((record) => isPhoneMatch(record.normalizedPhone || record.phone || "", phone));
      showLabel(fromJson && isKnownLabel(fromJson.label) ? fromJson.label : "unknown");
    };

    const submitReport = () => {
      const originalPhone = reportPhoneEl.value.trim();
      const normalizedPhone = normalizePhoneNumber(originalPhone);
      const label = reportLabelEl.value;

      if (!normalizedPhone || !isKnownLabel(label)) {
        reportMsgEl.textContent = "Enter number + label";
        return;
      }

      const reports = readReports();
      reports.push({ phone: originalPhone, normalizedPhone, label, createdAt: Date.now() });
      writeReports(reports);

      reportPhoneEl.value = "";
      reportLabelEl.value = "scam";
      reportMsgEl.textContent = "Saved";
    };

    searchBtn.addEventListener("click", search);
    inputEl.addEventListener("keydown", (event) => {
      if (event.key === "Enter") search();
    });

    reportBtn.addEventListener("click", submitReport);
    reportPhoneEl.addEventListener("keydown", (event) => {
      if (event.key === "Enter") submitReport();
    });

    fetch("./scam_numbers.json")
      .then((response) => {
        if (!response.ok) {
          throw new Error("Failed to load data");
        }
        return response.json();
      })
      .then((data) => {
        const loaded = Array.isArray(data.records) ? data.records : [];
        records = loaded.map((record) => ({
          ...record,
          normalizedPhone: normalizePhoneNumber(record.phone || "")
        }));
      })
      .catch(() => {
        records = [];
      });
  </script>
</body>
</html>
