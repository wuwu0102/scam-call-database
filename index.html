<!doctype html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alerta Número MX</title>
  <style>
    :root {
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f5f6f8;
      color: #111;
      padding: 16px 0;
    }

    .app {
      width: min(92vw, 420px);
      text-align: center;
    }

    h1 {
      margin: 0 0 4px;
      font-size: 1.6rem;
    }

    .subtitle {
      margin: 0 0 12px;
      color: #374151;
      font-size: 0.96rem;
    }

    .section {
      background: #fff;
      border: 1px solid #e5e6ea;
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 12px;
      text-align: left;
    }

    h2 {
      margin: 6px 0 12px;
      font-size: 1rem;
      text-align: center;
    }

    input,
    select,
    button {
      width: 100%;
      box-sizing: border-box;
      border-radius: 12px;
      border: 1px solid #ccc;
      padding: 14px;
      font-size: 1.05rem;
      margin-bottom: 10px;
      background: #fff;
    }

    button {
      background: #111;
      color: #fff;
      border: none;
      cursor: pointer;
      margin-bottom: 0;
    }

    .result-card {
      margin-top: 12px;
      border-radius: 12px;
      border: 1px solid transparent;
      padding: 12px;
      background: #f3f4f6;
      min-height: 88px;
    }

    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
      font-size: 0.9rem;
    }

    .result-badge {
      border-radius: 999px;
      padding: 3px 10px;
      font-size: 0.8rem;
      font-weight: 700;
      color: #fff;
      text-transform: capitalize;
    }

    .result-text {
      font-size: 1.35rem;
      font-weight: 700;
      line-height: 1.2;
      word-break: break-word;
    }

    .result-meta {
      margin-top: 8px;
      font-size: 0.88rem;
      color: #333;
      line-height: 1.35;
      word-break: break-word;
    }

    .result-note {
      margin-top: 8px;
      font-size: 0.92rem;
      color: #444;
      line-height: 1.35;
      word-break: break-word;
    }

    .result-scam {
      border-color: #fecaca;
      background: #fef2f2;
    }

    .result-scam .result-badge {
      background: #dc2626;
    }

    .result-suspicious {
      border-color: #fed7aa;
      background: #fff7ed;
    }

    .result-suspicious .result-badge {
      background: #ea580c;
    }

    .result-safe {
      border-color: #bbf7d0;
      background: #f0fdf4;
    }

    .result-safe .result-badge {
      background: #16a34a;
    }

    .result-unknown {
      border-color: #d1d5db;
      background: #f9fafb;
    }

    .result-unknown .result-badge {
      background: #6b7280;
    }

    #setupMsg,
    #searchMsg,
    #reportMsg {
      min-height: 1.2em;
      font-size: 0.95rem;
      margin-top: 8px;
    }

    #setupMsg {
      color: #a33;
      margin-bottom: 8px;
      margin-top: 0;
      text-align: center;
    }

    #searchMsg {
      color: #a33;
      text-align: center;
    }

    #reportMsg.success {
      color: #0a7a31;
    }

    #reportMsg.error {
      color: #a33;
    }

    .disclaimer {
      margin: 4px 8px 0;
      color: #4b5563;
      font-size: 0.82rem;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>Alerta Número MX</h1>
    <p class="subtitle">Consulta y reporta números sospechosos en México.</p>
    <section class="section">
      <h2>Buscar número</h2>
      <div id="setupMsg" aria-live="polite"></div>
      <input id="phoneInput" type="tel" placeholder="Número de teléfono" autocomplete="off" />
      <button id="searchBtn" type="button">Buscar</button>
      <div id="searchMsg" aria-live="polite"></div>
      <div id="resultCard" class="result-card result-unknown" aria-live="polite">
        <div class="result-header">
          <span>Resultado</span>
          <span id="resultBadge" class="result-badge">Desconocido</span>
        </div>
        <div id="resultText" class="result-text">Desconocido</div>
        <div id="resultMeta" class="result-meta"></div>
        <div id="resultNote" class="result-note"></div>
      </div>
    </section>

    <section class="section">
      <h2>Reportar número</h2>
      <input id="reportPhoneInput" type="tel" placeholder="Número de teléfono" autocomplete="off" />
      <select id="reportLabelInput" aria-label="Tipo de reporte">
        <option value="scam">Fraude</option>
        <option value="suspicious">Sospechoso</option>
        <option value="safe">Seguro</option>
        <option value="unknown">Desconocido</option>
      </select>
      <input id="reportNoteInput" type="text" placeholder="Nota opcional" autocomplete="off" />
      <button id="reportBtn" type="button">Guardar reporte</button>
      <div id="reportMsg" aria-live="polite"></div>
    </section>
    <p class="disclaimer">Los reportes son informativos. Verifica antes de responder o devolver llamadas.</p>
  </main>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
    import {
      collection,
      getFirestore,
      getDocs,
      addDoc
    } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA5uH0wpdpgQHiKlrHp5DgrF7cgEXLHm5w",
      authDomain: "phone-lookup-app-f8f33.firebaseapp.com",
      projectId: "phone-lookup-app-f8f33",
      storageBucket: "phone-lookup-app-f8f33.firebasestorage.app",
      messagingSenderId: "161960355251",
      appId: "1:161960355251:web:4fa3b7ccb25dfbf63957c6",
      measurementId: "G-0KLSX77SM7"
    };

    const LABELS = {
      scam: { "zh-TW": "詐騙", en: "Scam", "es-MX": "Fraude" },
      suspicious: { "zh-TW": "可疑", en: "Suspicious", "es-MX": "Sospechoso" },
      safe: { "zh-TW": "安全", en: "Safe", "es-MX": "Seguro" },
      unknown: { "zh-TW": "未知", en: "Unknown", "es-MX": "Desconocido" }
    };
    const COLLECTION_NAME = "phone_numbers";

    const resultCardEl = document.getElementById("resultCard");
    const resultBadgeEl = document.getElementById("resultBadge");
    const resultTextEl = document.getElementById("resultText");
    const resultMetaEl = document.getElementById("resultMeta");
    const resultNoteEl = document.getElementById("resultNote");
    const setupMsgEl = document.getElementById("setupMsg");
    const searchMsgEl = document.getElementById("searchMsg");
    const inputEl = document.getElementById("phoneInput");
    const searchBtn = document.getElementById("searchBtn");
    const reportPhoneEl = document.getElementById("reportPhoneInput");
    const reportLabelEl = document.getElementById("reportLabelInput");
    const reportNoteEl = document.getElementById("reportNoteInput");
    const reportBtn = document.getElementById("reportBtn");
    const reportMsgEl = document.getElementById("reportMsg");

    const lang = "es-MX";
    const normalizePhoneNumber = (value) => String(value || "").replace(/\D/g, "");
    const buildPhoneKeys = (value) => {
      const normalized = normalizePhoneNumber(value);
      if (!normalized) return [];

      const keys = [normalized];
      if (normalized.length === 11 && normalized.startsWith("1")) {
        keys.push(normalized.slice(1));
      }
      return keys;
    };

    const isPhoneMatch = (left, right) => {
      const leftKeys = buildPhoneKeys(left);
      const rightKeys = buildPhoneKeys(right);
      return leftKeys.some((leftKey) => rightKeys.includes(leftKey));
    };

    const isKnownLabel = (label) => Object.hasOwn(LABELS, label);

    const getDisplayLabel = (tag, label) => {
      const normalized = String(tag || "").toLowerCase();
      if (label && typeof label === "object") {
        return label[lang] || label.en || LABELS.unknown[lang];
      }
      if (isKnownLabel(normalized)) {
        return LABELS[normalized][lang];
      }
      return tag || LABELS.unknown[lang];
    };

    const getStyleKey = (tag) => {
      const normalized = String(tag || "").toLowerCase();
      if (["scam", "suspicious", "safe", "unknown"].includes(normalized)) {
        return normalized;
      }
      return "unknown";
    };

    const getLocalizedNote = (note) => {
      if (!note) return "";
      if (typeof note === "object") {
        return note[lang] || note.en || "";
      }
      return String(note);
    };

    const SOURCE_TYPE_LABELS = {
      user_report: "reportado por usuario",
      user_submitted: "reportado por usuario",
      official: "fuente oficial",
      community: "comunidad"
    };
    const CONFIDENCE_LABELS = {
      high: "alta",
      medium: "media",
      low: "baja",
      "user-submitted": "reportado por usuario"
    };

    const getSpanishMetaValue = (value, typeMap = {}) => {
      const rawValue = String(value || "");
      if (!rawValue) return "";
      const normalized = rawValue.toLowerCase().replace(/\s+/g, "_");
      return typeMap[normalized] || typeMap[rawValue.toLowerCase()] || rawValue;
    };

    const showResult = ({ tag = "unknown", label = null, note = "", sourceName = "", sourceType = "", confidence = "" } = {}) => {
      const styleKey = getStyleKey(tag);
      const displayLabel = getDisplayLabel(tag || "unknown", label);
      const badgeText = LABELS[styleKey][lang];

      resultCardEl.className = `result-card result-${styleKey}`;
      resultBadgeEl.textContent = badgeText;
      resultTextEl.textContent = displayLabel;

      const metaBits = [];
      if (sourceName) metaBits.push(`Fuente: ${sourceName}`);
      if (sourceType) metaBits.push(`Tipo: ${getSpanishMetaValue(sourceType, SOURCE_TYPE_LABELS)}`);
      if (confidence) metaBits.push(`Confianza: ${getSpanishMetaValue(confidence, CONFIDENCE_LABELS)}`);
      resultMetaEl.textContent = metaBits.join(" · ");

      const resolvedNote = getLocalizedNote(note);
      resultNoteEl.textContent = resolvedNote ? `Nota: ${resolvedNote}` : "";
    };

    const setReportMessage = (message, type) => {
      reportMsgEl.textContent = message;
      reportMsgEl.className = type ? type : "";
    };

    let firestore = null;
    let mexicoSeedRecords = [];
    let fallbackRecords = [];

    try {
      const app = initializeApp(firebaseConfig);
      firestore = getFirestore(app);
    } catch {
      setupMsgEl.textContent = "Configuración de Firebase pendiente";
    }

    const findLatestFirestoreRecord = async (phoneNormalized) => {
      if (!firestore) return null;

      try {
        const snapshot = await getDocs(collection(firestore, COLLECTION_NAME));

        let latest = null;
        snapshot.forEach((docItem) => {
          const record = docItem.data();
          const recordNumber = record.normalizedNumber || record.number || "";
          if (!isPhoneMatch(recordNumber, phoneNormalized)) return;

          if (!latest || Number(record.createdAt || 0) > Number(latest.createdAt || 0)) {
            latest = record;
          }
        });

        return latest;
      } catch {
        setupMsgEl.textContent = "Configuración de Firebase pendiente";
        return null;
      }
    };

    const findRecordFromArray = (records, phoneNormalized) =>
      records.find((record) => isPhoneMatch(record.normalizedNumber || record.normalizedPhone || record.number || record.phone || "", phoneNormalized));

    const search = async () => {
      const phone = normalizePhoneNumber(inputEl.value.trim());
      searchMsgEl.textContent = "";
      if (!phone) {
        searchMsgEl.textContent = "Ingresa un número de teléfono";
        showResult();
        return;
      }

      const firestoreRecord = await findLatestFirestoreRecord(phone);
      if (firestoreRecord && firestoreRecord.tag) {
        showResult({
          tag: firestoreRecord.tag,
          label: firestoreRecord.label,
          note: firestoreRecord.note || "",
          sourceName: firestoreRecord.sourceName || "Firestore user report",
          sourceType: firestoreRecord.sourceType || "user_report",
          confidence: firestoreRecord.confidence || "user-submitted"
        });
        return;
      }

      const mexicoSeedRecord = findRecordFromArray(mexicoSeedRecords, phone);
      if (mexicoSeedRecord && mexicoSeedRecord.tag) {
        showResult(mexicoSeedRecord);
        return;
      }

      const fallbackRecord = findRecordFromArray(fallbackRecords, phone);
      if (fallbackRecord) {
        showResult({
          tag: fallbackRecord.label || "unknown",
          label: fallbackRecord.tag || null,
          note: fallbackRecord.note || "",
          sourceName: fallbackRecord.sourceName || "scam_numbers.json",
          sourceType: fallbackRecord.sourceType || "fallback_json",
          confidence: fallbackRecord.confidence || "legacy"
        });
        return;
      }

      showResult();
    };

    const submitReport = async () => {
      const originalPhone = reportPhoneEl.value.trim();
      const normalizedPhone = normalizePhoneNumber(originalPhone);
      const tag = reportLabelEl.value;
      const note = reportNoteEl.value.trim();

      if (!normalizedPhone || !isKnownLabel(tag)) {
        setReportMessage("Ingresa un número de teléfono", "error");
        return;
      }

      if (!firestore) {
        setReportMessage("Configuración de Firebase pendiente", "error");
        return;
      }

      try {
        await addDoc(collection(firestore, COLLECTION_NAME), {
          number: originalPhone,
          normalizedNumber: normalizedPhone,
          tag,
          lang,
          note,
          createdAt: Date.now(),
        });

        reportPhoneEl.value = "";
        reportLabelEl.value = "scam";
        reportNoteEl.value = "";
        setReportMessage("Reporte guardado", "success");
      } catch {
        setReportMessage("No se pudo guardar el reporte", "error");
      }
    };

    searchBtn.addEventListener("click", () => {
      search();
    });

    inputEl.addEventListener("keydown", (event) => {
      if (event.key === "Enter") search();
    });

    reportBtn.addEventListener("click", () => {
      submitReport();
    });

    reportPhoneEl.addEventListener("keydown", (event) => {
      if (event.key === "Enter") submitReport();
    });

    fetch("./data/mexico_seed_phone_numbers.json")
      .then((response) => {
        if (!response.ok) {
          throw new Error("Failed to load mexico seed data");
        }
        return response.json();
      })
      .then((data) => {
        mexicoSeedRecords = Array.isArray(data) ? data : [];
      })
      .catch(() => {
        mexicoSeedRecords = [];
      });

    fetch("./scam_numbers.json")
      .then((response) => {
        if (!response.ok) {
          throw new Error("Failed to load fallback data");
        }
        return response.json();
      })
      .then((data) => {
        const loaded = Array.isArray(data.records) ? data.records : [];
        fallbackRecords = loaded.map((record) => ({
          ...record,
          normalizedPhone: normalizePhoneNumber(record.phone || "")
        }));
      })
      .catch(() => {
        fallbackRecords = [];
      });
  </script>
</body>
</html>
